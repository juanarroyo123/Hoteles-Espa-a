name: Actualizar ADR Hoteles

on:
  schedule:
    - cron: '0 2 * * *'   # cada día a las 2h UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich-adr:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Chrome ya viene instalado en ubuntu-latest, solo actualizamos ────
      - name: Verificar Chrome
        run: |
          google-chrome --version || \
          (wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb \
           && sudo apt-get install -y ./google-chrome-stable_current_amd64.deb)
          google-chrome --version

      # ── Dependencias Python ──────────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install undetected-chromedriver beautifulsoup4 lxml httpx[http2]

      # ── Scraper ADR ──────────────────────────────────────────────────────
      - name: Ejecutar enrich_registry
        env:
          GITHUB_ACTIONS: 'true'
          PYTHONUNBUFFERED: '1'
        run: |
          python enrich_registry.py \
            --input licencias.json.gz \
            --limit 5000 \
            --workers 3 \
            --fast \
            --headless

      # ── Commit resultado ─────────────────────────────────────────────────
      - name: Commit y push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add registro_enriquecido.json
          git diff --staged --quiet || \
            git commit -m "ADR actualizado $(date +'%d/%m/%Y %H:%M UTC') — $(python -c 'import json; d=json.load(open(\"registro_enriquecido.json\")); print(len(d),\"hoteles\")')"
          git push
