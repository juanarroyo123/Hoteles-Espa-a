name: Actualizar ADR Hoteles

on:
  schedule:
    - cron: '0 2 * * *'   # cada día a las 2h UTC (sin interferir con scrape.yml)
  workflow_dispatch:        # también se puede lanzar a mano desde GitHub

permissions:
  contents: write

jobs:
  enrich-adr:
    runs-on: ubuntu-latest
    timeout-minutes: 340    # 5h40min — máximo seguro antes del límite de 6h

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Chrome estable ───────────────────────────────────────────────────
      - name: Instalar Chrome
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg
          curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
            | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] \
            http://dl.google.com/linux/chrome/deb/ stable main" \
            | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── Dependencias Python ──────────────────────────────────────────────
      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install undetected-chromedriver beautifulsoup4 lxml httpx[http2]

      # ── Scraper ADR ──────────────────────────────────────────────────────
      - name: Ejecutar enrich_registry
        env:
          GITHUB_ACTIONS: 'true'
          PYTHONUNBUFFERED: '1'
        run: |
          python enrich_registry.py \
            --input licencias.json.gz \
            --limit 5000 \
            --workers 3 \
            --fast \
            --headless

      # ── Commit resultado ─────────────────────────────────────────────────
      - name: Commit y push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add registro_enriquecido.json
          git diff --staged --quiet || \
            git commit -m "ADR actualizado $(date +'%d/%m/%Y %H:%M UTC') — $(python -c 'import json; d=json.load(open(\"registro_enriquecido.json\")); print(len(d),\"hoteles\")')"
          git push
